<script>
// =====================
// MÁSCARA AUTOMÁTICA DE DATA (DD/MM/AAAA)
// =====================
function mascaraData(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 8);
    if (v.length >= 5) {
        input.value = `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
    } else if (v.length >= 3) {
        input.value = `${v.slice(0, 2)}/${v.slice(2)}`;
    } else {
        input.value = v;
    }
}

// =====================
// TABELA CABALÍSTICA
// =====================
const tabela = {
  A:1, J:1, I:1, Q:1, Y:1,
  B:2, K:2, R:2,
  C:3, G:3, L:3, S:3,
  D:4, M:4, T:4,
  E:5, H:5, N:5,
  U:6, V:6, W:6, X:6, Ç:6,
  O:7, Z:7,
  F:8, P:8
};

const vogais = ["A","E","I","O", "Y", "U"];

// =====================
// ACENTOS
// =====================
function calcularValorComAcentos(letra){
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if(!valorBase) return 0;

  let soma = 0;
  let mult = 1;

  for(let c of letra.normalize("NFD")){
    if(c === "\u0301") soma += 2;
    else if(c === "\u0302") soma += 7;
    else if(c === "\u0303") soma += 3;
    else if(c === "\u0327") soma += 3;
    else if(c === "\u0300") mult *= 2;
    else if(c === "\u0308") mult *= 2;
  }

  return (valorBase + soma) * mult;
}

function reduzir(n){
  n = Math.abs(n);
  while(n > 9){
    n = n.toString().split("").reduce((a,b)=>a+Number(b),0);
  }
  return n;
}

// Tratamento adaptado para o novo formato DD/MM/AAAA
function calcularAnoPessoal(data){
  if(!data || data.length < 10) return 0;
  const [dia, mes, ano] = data.split("/").map(Number);
  const anoAtual = new Date().getFullYear();
  const soma = reduzir(dia) + reduzir(mes) + reduzir(anoAtual);
  return reduzir(soma);
}  

// =====================
// CALCULO COMPLETO
// =====================
function calcularPessoa(nome, data){
  nome = nome.toUpperCase();
  let somaV=0, somaC=0;
  let valores=[];

  for(let l of nome){
    const valor = calcularValorComAcentos(l);
    if(!valor) continue;

    valores.push(reduzir(valor));

    const base = l.normalize("NFD")[0];
    if(vogais.includes(base)) somaV += valor;
    else somaC += valor;
  }

  const motivacao = reduzir(somaV);
  const influencia = reduzir(somaC);
  const personalidade = reduzir(somaV+somaC);

  let caminho=0, proposito=0;

  if(data && data.length === 10){
    const [dia, mes, ano] = data.split("/").map(Number);
    caminho = reduzir(dia+mes+ano);
    proposito = reduzir(caminho+personalidade);
  }

  const harmonia = proposito;

  return {
    motivacao,
    influencia,
    personalidade,
    caminho,
    proposito,
    harmonia,
    valores
  }
}

// =====================
// PIRÂMIDE INVERTIDA
// =====================
function gerarPiramide(valores, elementoPiramide, elementoRegente){
  let numerosSequencias = [];

  if(!valores || valores.length === 0){
    elementoPiramide.innerHTML="";
    elementoRegente.innerHTML="";
    return;
  }

  let lines = [valores.map(Number)];

  while(lines[lines.length-1].length > 1){
    let anterior = lines[lines.length-1];
    let nova = [];
    for(let i=0;i<anterior.length-1;i++){
      nova.push(Number(reduzir(anterior[i] + anterior[i+1])));
    }
    lines.push(nova);
  }

  let marcacoes = [];
  for(let l=0; l<lines.length; l++){
    marcacoes[l] = new Set();
    let linha = lines[l];
    let i=0;

    while(i < linha.length){
      let atual = Number(linha[i]);
      let count = 1;
      let j = i+1;

      while(j < linha.length && Number(linha[j]) === atual){
        count++;
        j++;
      }

      if(count >= 3){
        for(let k=i; k<i+count; k++){
          marcacoes[l].add(k);
        }
      }
      i += count;
    }
  }

  let html="";
  for(let l=0; l<lines.length; l++){
    html += lines[l].map((n,idx)=>{
      if (marcacoes[l].has(idx)){
        if (!numerosSequencias.includes(n)) {
          numerosSequencias.push(n);
        }
        return `<span class="negativo">${n}</span>`;
      }
      return n;
    }).join(" ") + "<br>";
  }

  elementoPiramide.innerHTML = html;
  const regente = lines[lines.length - 1][0];

  elementoRegente.innerHTML = `
    <div class="botoes-piramide">
      <button onclick="abrirModalRegente(textos.regente[${regente}], '${elementoRegente.id}')">
        Regente: ${regente}
      </button>
      <button onclick="mostrarSequenciaNegativa('${elementoRegente.id}')">
        Sequência Negativa
      </button>
    </div>
  `;

  if (elementoRegente.id === "regente1") { dados1.regente = regente; dados1.sequenciaNegativa = numerosSequencias; }
  if (elementoRegente.id === "regente2") { dados2.regente = regente; dados2.sequenciaNegativa = numerosSequencias; }
  if (elementoRegente.id === "regenteBebe") { dadosBebe.regente = regente; dadosBebe.sequenciaNegativa = numerosSequencias; }

  if (elementoRegente.id === "regenteBebe") {
    const resultado = document.getElementById("resultadoBebe");
    if (!numerosSequencias || numerosSequencias.length === 0) {
      resultado.innerHTML = "✅ Este nome é harmônico.";
    } else {
      resultado.innerHTML = "❌ Este nome possui sequência negativa e não é harmônico.";
    }
  }
}

// =====================
// SINASTRIA
// =====================
function chaveSinastria(a,b){
  const menor = Math.min(a,b);
  const maior = Math.max(a,b);
  return `${menor}-${maior}`;
}

function mostrarSinastria(){
  if(!dados1 || !dados2) return;

  const nome1 = document.getElementById("social1").value || document.getElementById("nome1").value;
  const nome2 = document.getElementById("social2").value || document.getElementById("nome2").value;

  const energia1 = dados1.proposito;
  const energia2 = dados2.proposito;
  const chave = chaveSinastria(energia1, energia2);

  let texto = textos.sinastria[chave] || `A combinação entre o relacionamento de ${energia1} e Energia ${energia2}.`;

  const menor = Math.min(energia1, energia2);
  const maior = Math.max(energia1, energia2);
  const nomeMenor = (energia1 === menor) ? nome1 : nome2;
  const nomeMaior = (energia1 === maior) ? nome1 : nome2;

  texto = texto.replaceAll(`Energia ${menor}`, nomeMenor);
  texto = texto.replaceAll(`Energia ${maior}`, nomeMaior);
  texto = texto.replaceAll(`número ${menor}`, nomeMenor);
  texto = texto.replaceAll(`número ${maior}`, nomeMaior);
  texto = texto.replaceAll(`Número ${menor}`, nomeMenor);
  texto = texto.replaceAll(`Número ${maior}`, nomeMaior);

  const textoFinal = `<h3>Harmonia Conjugal – ${nome1} com ${nome2}</h3>${texto}`;
  abrirModalTexto(textoFinal);
}

// =====================
// MODAIS COM NOME PERSONALIZADO
// =====================
function abrirModalTexto(texto){
  document.getElementById("modalTexto").innerHTML = texto;
  document.getElementById("modal").style.display="block";
}

function formatarTextoPersonalizado(texto, nomeEscolhido) {
  if (!texto) return "";
  let nomeF = nomeEscolhido.trim();
  if (nomeF) {
      nomeF = nomeF.charAt(0).toUpperCase() + nomeF.slice(1).toLowerCase();
  } else {
      nomeF = "Você";
  }
  let t = texto;
  t = t.replace(/você/gi, `<strong>${nomeF}</strong>`);
  return t;
}

function abrirModal(tipo) {
  let textoBase = "";
  let nomePessoa = "";

  if (tipo.includes("1")) {
    nomePessoa = document.getElementById("social1").value || document.getElementById("nome1").value;
    if(tipo==="m1") textoBase = textos.motivacao[dados1.motivacao];
    if(tipo==="i1") textoBase = textos.influencia[dados1.influencia];
    if(tipo==="p1") textoBase = textos.personalidade[dados1.personalidade];
    if(tipo==="d1") textoBase = textos.CaminhodeVida[dados1.caminho];
    if(tipo==="pr1") textoBase = textos.proposito[dados1.proposito];
    if(tipo==="h1") textoBase = textos.harmonia[dados1.proposito];
    if(tipo==="a1") textoBase = textos.anoPessoal[dados1.anoPessoal];
  } 
  else if (tipo.includes("2")) {
    nomePessoa = document.getElementById("social2").value || document.getElementById("nome2").value;
    if(tipo==="m2") textoBase = textos.motivacao[dados2.motivacao];
    if(tipo==="i2") textoBase = textos.influencia[dados2.influencia];
    if(tipo==="p2") textoBase = textos.personalidade[dados2.personalidade];
    if(tipo==="d2") textoBase = textos.CaminhodeVida[dados2.caminho];
    if(tipo==="pr2") textoBase = textos.proposito[dados2.proposito];
    if(tipo==="h2") textoBase = textos.harmonia[dados2.proposito];
    if(tipo==="a2") textoBase = textos.anoPessoal[dados2.anoPessoal];
  }
  else if (tipo.includes("B")) {
    nomePessoa = document.getElementById("socialBebe").value || document.getElementById("nomeBebe").value;
    if(tipo==="mB") textoBase = textos.motivacao[dadosBebe.motivacao];
    if(tipo==="iB") textoBase = textos.influencia[dadosBebe.influencia];
    if(tipo==="pB") textoBase = textos.personalidade[dadosBebe.personalidade];
  }

  abrirModalTexto(formatarTextoPersonalizado(textoBase, nomePessoa));
}

function abrirModalRegente(texto, idRegente) {
    let nomeInput = "";
    if (idRegente === "regente1") nomeInput = document.getElementById("social1").value || document.getElementById("nome1").value;
    else if (idRegente === "regente2") nomeInput = document.getElementById("social2").value || document.getElementById("nome2").value;
    else if (idRegente === "regenteBebe") nomeInput = document.getElementById("socialBebe").value || document.getElementById("nomeBebe").value;

    abrirModalTexto(formatarTextoPersonalizado(texto, nomeInput));
}

function mostrarSequenciaNegativa(idRegente){
  let dados;
  let nomeInput = "";

  if (idRegente === "regente1") { dados = dados1; nomeInput = document.getElementById("social1").value || document.getElementById("nome1").value; }
  else if (idRegente === "regente2") { dados = dados2; nomeInput = document.getElementById("social2").value || document.getElementById("nome2").value; }
  else if (idRegente === "regenteBebe") { dados = dadosBebe; nomeInput = document.getElementById("socialBebe").value || document.getElementById("nomeBebe").value; }

  if (!dados || !dados.sequenciaNegativa || dados.sequenciaNegativa.length === 0){
    abrirModalTexto("Nenhuma sequência negativa encontrada.");
    return;
  }

  const textoBruto = dados.sequenciaNegativa.map(n => textos.sequenciaNegativa[n]).join("<br><br>");
  abrirModalTexto(formatarTextoPersonalizado(textoBruto, nomeInput));
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

// =====================
// CONTROLE DE FLUXO E GERAÇÃO
// =====================
function gerar(){
  const nome1 = document.getElementById("nome1").value;
  const nome2 = document.getElementById("nome2").value;
  const data1 = document.getElementById("data1").value;
  const data2 = document.getElementById("data2").value;

  if(!nome1 || !nome2) { alert("Por favor, preencha os nomes."); return; }
  if(data1.length < 10 || data2.length < 10) { alert("Por favor, preencha as datas completamente (DD/MM/AAAA)."); return; }

  dados1 = calcularPessoa(nome1, data1);
  dados2 = calcularPessoa(nome2, data2);
  dados1.anoPessoal = calcularAnoPessoal(data1);
  dados2.anoPessoal = calcularAnoPessoal(data2);

  gerarPiramide(dados1.valores, document.getElementById("piramide1"), document.getElementById("regente1"));
  gerarPiramide(dados2.valores, document.getElementById("piramide2"), document.getElementById("regente2"));

  document.getElementById("compat").innerHTML = "⚡ Cálculos processados com sucesso. Prontos para Sinastria!";
}

let dadosBebe = null;
function gerarBebe(){
  const nomeBebe = document.getElementById("nomeBebe").value;
  if(!nomeBebe) return;
  dadosBebe = calcularPessoa(nomeBebe, null);
  gerarPiramide(dadosBebe.valores, document.getElementById("piramideBebe"), document.getElementById("regenteBebe"));
}
