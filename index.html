<style>


/* ===================================================
   ESPAÇAMENTO GERAL DE RESPIRO (TOPO E BASE DA PÁGINA)
   =================================================== */

.bloco-texto-pdf {
    /* Força o navegador a incluir o espaçamento dentro do tamanho total da folha */
    box-sizing: border-box !important; 

    /* Ajuste Geral de Margem Interna (Respiro):
       Top: 40mm (o espaço no topo que você pediu)
       Right: 20mm (lateral direita)
       Bottom: 30mm (espaço na parte de baixo para não sumir texto)
       Left: 20mm (lateral esquerda) */
    padding: 40mm 20mm 30mm 20mm !important; 

    /* Garante que o fundo branco cubra toda a área */
    background: #ffffff !important; 
}

    
    /* =======================================================
       1. VARIÁVEIS E CONFIGURAÇÃO GLOBAL DO SITE (TELA)
       ======================================================= */
    :root {
        --primary: #d49a9a; 
        --secondary: #6B0202;
        --bg: #0a0f24;
        --card-bg: #121833;
        --text: #ffffff;
        --accent: #ffd700; 
        --danger: #ff3b5c;
        --success: #28a745;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
    
    .header { text-align: center; padding: 50px 20px; background: linear-gradient(180deg, #1d182b 0%, var(--bg) 100%); border-bottom: 1px solid rgba(212, 154, 154, 0.2); }
    .header h1 { font-family: 'Cinzel', serif; color: var(--primary); font-size: 2.5rem; letter-spacing: 2px; text-shadow: 0 0 15px rgba(212, 154, 154, 0.3); }
    .header p { font-size: 1rem; color: #aaa; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; }

    .container { max-width: 1100px; margin: auto; padding: 20px; }

    .page {
        width: calc(100% - 2mm);
        margin: 0 auto;
        padding: 40px 2mm 20px 2mm; 
    }
    
    /* Grid de Inputs e Pirâmide */
    .grid-pessoa {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 40px;
        background: rgba(255, 255, 255, 0.02);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(212, 154, 154, 0.15);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card-input, .card-piramide { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    .card-piramide { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    h3 { margin-bottom: 25px; font-family: 'Cinzel', serif; color: var(--primary); border-bottom: 1px solid rgba(212, 154, 154, 0.3); padding-bottom: 10px; font-size: 1.3rem; letter-spacing: 1px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #ddd; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    input, select {
        width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #2e3c78;
        background: #171e3d; color: white; font-size: 1rem; transition: 0.3s;
    }
    input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(212, 154, 154, 0.4); }

    .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 20px; }
    button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 0.8rem; text-transform: uppercase; }
    .btn-nav { background: #242d54; color: white; border: 1px solid rgba(212, 154, 154, 0.2); }
    .btn-nav:hover { background: var(--primary); color: #000; }
    
    .btn-action { background: linear-gradient(135deg, var(--secondary) 0%, #a81313 100%); color: white; font-size: 1rem; padding: 15px 35px; border-radius: 50px; font-family: 'Cinzel', serif; letter-spacing: 1px; box-shadow: 0 5px 20px rgba(107, 2, 2, 0.4); }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(107, 2, 2, 0.6); }
    
    .main-actions { display: flex; justify-content: center; gap: 20px; margin: 40px 0; flex-wrap: wrap; }

    .piramide { font-family: 'Courier New', monospace; font-size: 1.2rem; line-height: 1.6; letter-spacing: 6px; margin: 20px 0; min-height: 100px; color: #fff; white-space: pre-line; }
    .negativo { color: var(--danger); font-weight: bold; text-shadow: 0 0 10px rgba(255,59,92,0.6); }
    .regente { margin-top: 15px; font-weight: bold; }

    .modal { display:none; position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
    .modal-content { background: var(--card-bg); margin: 5% auto; padding: 35px; width: 85%; max-width: 700px; border-radius: 15px; position: relative; border: 1px solid var(--primary); max-height: 80vh; overflow-y: auto; box-shadow: 0 0 30px rgba(212, 154, 154, 0.2); }
    .close { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 28px; color: var(--danger); }

    #compat { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }

    @media (max-width: 850px) { .grid-pessoa { grid-template-columns: 1fr; } }

    /* =======================================================
       2. REGRAS VISUAIS DO PREVIEW DO PDF NA TELA (RESPONSIVO)
       ======================================================= */
    #area-pdf-local {
        width: 100%;
        display: block;
        margin-top: 50px;
    }

    /* CAPAS: Mantêm o tamanho fixo padrão A4 na tela */
    .pag-a4 {
        width: 100%;
        max-width: 210mm;
        height: 297mm;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
        margin: 0 auto 40px auto;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    }

    /* MIOLOS DE TEXTO: Livres para crescer caso o texto seja gigante */
    .bloco-texto-pdf {
        width: 100%;
        max-width: 210mm;
        height: auto !important; /* MUDANÇA CIRÚRGICA: Libera o crescimento do container pai */
        min-height: 297mm;       /* Mantém pelo menos o tamanho de uma folha A4 */
        background: #ffffff !important;
        color: #111111 !important;
        box-sizing: border-box;
        padding: 25mm 20mm;
        margin: 0 auto 40px auto;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: visible !important; /* MUDANÇA CIRÚRGICA: Permite ver o texto que passa */
        display: block;
    }

    .titulo-secao-pdf {
        font-family: 'Cinzel', serif; 
        color: #6B0202; 
        text-align: center; 
        margin-bottom: 25px; 
        border-bottom: 2px solid #d49a9a; 
        padding-bottom: 10px; 
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .subtitulo-pessoa-pdf {
        color: #8a1c32; 
        font-family: 'Poppins', sans-serif; 
        font-size: 14px; 
        margin-bottom: 12px;
        font-weight: 600;
        text-transform: uppercase;
        display: block;
    }

    .texto-cabalistico-pdf, .bloco-texto-pdf p {
        font-family: 'Poppins', sans-serif;
        font-size: 13px; 
        line-height: 1.7; 
        color: #222222 !important;
        margin-bottom: 20px;
        display: block;
        text-align: justify;
    }

    .texto-cabalistico-pdf strong, .bloco-texto-pdf strong {
        color: #6B0202 !important;
        font-weight: 600;
        display: inline;
    }

    .divisor-pdf {
        width: 100%; 
        height: 1px; 
        background: linear-gradient(to right, transparent, #d49a9a, transparent); 
        margin: 25px 0;
        display: block;
    }

    .botao-pdf-link { display: none !important; } 
    .player-relatorio { display: flex !important; } 

    /* =======================================================
       3. A RÍGIDA ENGENHARIA DE IMPRESSÃO (PDF REAL)
       ======================================================= */
    @media print {
        @page {
            size: A4 portrait;
            margin: 0 !important;
        }

        .header, .container, .grid-pessoa, .main-actions, #compat, .modal, 
        button, #botoes-pdf-direto, .close, #botoes-modal-pdf {
            display: none !important;
        }

        body {
            background: #110106 !important;
            margin: 0 !important;
            padding: 0 !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        #area-pdf-local { margin-top: 0 !important; }
        #conteudo-pdf-rolavel { display: block !important; width: 210mm !important; }

        /* CAPAS IMPRESSAS: Mantêm rigidez absoluta em 297mm (Não quebram) */
        .pag-a4 {
            width: 210mm !important;
            height: 297mm !important; 
            min-height: 297mm !important;
            max-height: 297mm !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            page-break-before: always !important;
            page-break-after: always !important;
            page-break-inside: avoid !important; /* Protege a capa */
            box-sizing: border-box !important;
        }

        /* MIOLOS IMPRESSOS: Totalmente dinâmicos. Se o texto passar, gera nova folha! */
        .bloco-texto-pdf {
            width: 210mm !important;
            height: auto !important;       /* MUDANÇA CIRÚRGICA: Libera o motor do PDF */
            min-height: 297mm !important;   /* Ocupa no mínimo uma folha inteira */
            max-height: none !important;    /* Libera limite máximo */
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            page-break-before: always !important;
            page-break-after: always !important;
            page-break-inside: auto !important; /* MUDANÇA CIRÚRGICA: Permite quebra natural */
            box-sizing: border-box !important;
            padding: 25mm 20mm !important; 
            display: block !important;       /* Garante fluxo contínuo de cima para baixo */
            overflow: visible !important;
        }

        /* Evita que uma caixinha vermelha de sequência se rompa feio ao meio na virada de página */
        .bloco-texto-pdf div, .bloco-texto-pdf h2, .bloco-texto-pdf h3 {
            page-break-inside: avoid !important;
        }

        .pag-a4:first-child {
            page-break-before: avoid !important;
        }

        .pag-a4 {
            background: radial-gradient(circle, #2d0713 0%, #110106 100%) !important;
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important; 
        }

        .bloco-texto-pdf *, .texto-cabalistico-pdf {
            color: #222222 !important;
            background: transparent !important;
        }

        .titulo-secao-pdf { color: #6B0202 !important; }
        .subtitulo-pessoa-pdf { color: #8a1c32 !important; }

        .player-relatorio { display: none !important; }
        .botao-pdf-link { display: flex !important; }
    }

    /* =======================================================
       4. COMPORTAMENTO RESPONSIVO EXCLUSIVO PARA O CELULAR (TELA)
       ======================================================= */
    @media screen and (max-width: 768px) {
        .pag-a4, .bloco-texto-pdf {
            width: 100% !important;
            height: auto !important;
            min-height: auto !important;
            max-height: none !important;
            margin: 0 0 20px 0 !important;
            padding: 30px 15px !important;
            border-radius: 12px !important;
        }
        
        .capa-sinastria-premium, .capa-transicao-amor {
            height: auto !important;
            min-height: 580px !important;
            justify-content: center !important;
            gap: 25px !important;
            padding: 40px 20px !important;
        }

        .capa-sinastria-premium h1 { font-size: 20px !important; }
        .capa-sinastria-premium img, .capa-transicao-amor img { width: 140px !important; height: auto !important; }
        .piramide { font-size: 0.9rem; letter-spacing: 4px; }
    }

/* =======================================================
   CORREÇÃO DE ESPAÇAMENTO E PONTE DO TEXTOS.JS NO PDF

}

 /* ==========================================================
   SISTEMA DE PAGINAÇÃO E RESPIRO DO TOPO (MODELO IMPORTADO)
   ========================================================== */

/* 1. Configuração da folha física no PDF */
@media print {
    @page {
        size: A4;
        margin: 1.5cm !important; /* Cria o espaço de 1,5cm no topo e nas laterais para o texto descer */
    }

    /* Força o contador a iniciar do zero no documento */
    body {
        counter-reset: page;
    }
}

/* 2. Estilo do número da página (Esconde na tela, mostra no PDF) */
.page-footer {
    position: fixed;
    bottom: 0;
    right: 0;
    font-size: 10pt;
    color: #827108; /* Dourado nobre do seu padrão */
    display: none; 
}

@media print {
    .page-footer {
        display: block !important; /* Ativa apenas na impressão/PDF */
        position: fixed;
        bottom: 10mm;
        right: 10mm;
        z-index: 9999;
    }
    
    .page-number::after {
        counter-increment: page;
        content: "Página " counter(page);
    }
}




    

/* 3. Proteção da Capa (Para ela ignorar a margem e não quebrar) */
@media print {
    .capa, .capa-transicao, .capa-sinastria {
        page-break-before: always !important;
        page-break-after: always !important;
        margin: 0 !important; /* Zera a margem de 1.5cm só aqui */
        padding: 0 !important;
        height: 297mm !important; /* Trava no tamanho exato do A4 */
        position: relative;
        z-index: 10000;
        background-color: #000 !important;
    }

    /* Esconde a numeração especificamente na primeira página (Capa) */
    @page :first {
        @top-right { content: ""; }
        @bottom-right { content: ""; }
    }
}

/* 4. Ajuste da classe .page da Sinastria para aceitar o respiro */
.page {
    width: 100%;
    margin: 0 auto !important;
    padding-top: 10px !important; /* Deixa o @page comandar o recuo maior */
}  

/* ==========================================================
   SISTEMA DE PAGINAÇÃO NO TOPO (CABEÇALHO DIREITO)
   ========================================================== */

@media print {
    /* 1. Configura a folha física no PDF com margem e numeração no topo */
    @page {
        size: A4;
        /* Mantém o respiro de 1.5cm nas laterais e base, e dá 2cm no topo para o número e o texto respirarem */
        margin: 20mm 15mm 15mm 15mm !important;

<script>
function mascaraData(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 8);
    if (v.length >= 5) {
        input.value = `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
    } else if (v.length >= 3) {
        input.value = `${v.slice(0, 2)}/${v.slice(2)}`;
    } else {
        input.value = v;
    }
}

const tabela = {
  A:1, J:1, I:1, Q:1, Y:1, B:2, K:2, R:2, C:3, G:3, L:3, S:3,
  D:4, M:4, T:4, E:5, H:5, N:5, U:6, V:6, W:6, X:6, Ç:6, O:7, Z:7, F:8, P:8
};

const vogais = ["A","E","I","O", "Y", "U"];

function calcularValorComAcentos(letra){
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if(!valorBase) return 0;

  let soma = 0;
  let mult = 1;

  for(let c of letra.normalize("NFD")){
    if(c === "\u0301") soma += 2;
    else if(c === "\u0302") soma += 7;
    else if(c === "\u0303") soma += 3;
    else if(c === "\u0327") soma += 3;
    else if(c === "\u0300") mult *= 2;
    else if(c === "\u0308") mult *= 2;
  }
  return (valorBase + soma) * mult;
}

function reduzir(n){
  n = Math.abs(n);
  while(n > 9){
    n = n.toString().split("").reduce((a,b)=>a+Number(b),0);
  }
  return n;
}

function calcularAnoPessoal(data){
  if(!data || data.length < 10) return 0;
  const [dia, mes, ano] = data.split("/").map(Number);
  const anoAtual = new Date().getFullYear();
  return reduzir(reduzir(dia) + reduzir(mes) + reduzir(anoAtual));
}  

let dados1 = null;
let dados2 = null;

function calcularPessoa(nome, data){
  nome = nome.toUpperCase();
  let somaV=0, somaC=0;
  let valores=[];

  for(let l of nome){
    const valor = calcularValorComAcentos(l);
    if(!valor) continue;
    valores.push(reduzir(valor));
    const base = l.normalize("NFD")[0];
    if(vogais.includes(base)) somaV += valor;
    else somaC += valor;
  }

  const motivacao = reduzir(somaV);
  const influencia = reduzir(somaC);
  const personality = reduzir(somaV+somaC);
  let caminho=0, proposito=0;

  if(data && data.length === 10){
    const [dia, mes, ano] = data.split("/").map(Number);
    caminho = reduzir(dia+mes+ano);
    proposito = reduzir(caminho+personality);
  }
  return { motivacao, influencia, personalidade: personality, caminho, proposito, harmonia: proposito, valores };
}

function gerarPiramide(valores, elementoPiramide, elementoRegente){
  let numerosSequencias = [];
  if(!valores || valores.length === 0){
    elementoPiramide.innerHTML=""; elementoRegente.innerHTML=""; return;
  }

  let lines = [valores.map(Number)];
  while(lines[lines.length-1].length > 1){
    let anterior = lines[lines.length-1];
    let nova = [];
    for(let i=0;i<anterior.length-1;i++){
      nova.push(Number(reduzir(anterior[i] + anterior[i+1])));
    }
    lines.push(nova);
  }

  let marcacoes = [];
  for(let l=0; l<lines.length; l++){
    marcacoes[l] = new Set();
    let linha = lines[l];
    let i=0;
    while(i < linha.length){
      let atual = Number(linha[i]);
      let count = 1; let j = i+1;
      while(j < linha.length && Number(linha[j]) === atual) { count++; j++; }
      if(count >= 3){
        for(let k=i; k<i+count; k++) marcacoes[l].add(k);
      }
      i += count;
    }
  }

  let html="";
  for(let l=0; l<lines.length; l++){
    html += lines[l].map((n,idx)=>{
      if (marcacoes[l].has(idx)){
        if (!numerosSequencias.includes(n)) numerosSequencias.push(n);
        return `<span class="negativo">${n}</span>`;
      }
      return n;
    }).join(" ") + "<br>";
  }

  elementoPiramide.innerHTML = html;
  const regente = lines[lines.length - 1][0];

  elementoRegente.innerHTML = `
    <div class="botoes-piramide">
      <button onclick="abrirModalRegente(textos.regente[${regente}], '${elementoRegente.id}')">Regente: ${regente}</button>
      <button onclick="mostrarSequenciaNegativa('${elementoRegente.id}')">Sequência Negativa</button>
    </div>
  `;

  if (elementoRegente.id === "regente1") { dados1.regente = regente; dados1.sequenciaNegativa = numerosSequencias; }
  if (elementoRegente.id === "regente2") { dados2.regente = regente; dados2.sequenciaNegativa = numerosSequencias; }
  if (elementoRegente.id === "regenteBebe") { dadosBebe.regente = regente; dadosBebe.sequenciaNegativa = numerosSequencias; }

  if (elementoRegente.id === "regenteBebe") {
    const resultado = document.getElementById("resultadoBebe");
    resultado.innerHTML = (!numerosSequencias || numerosSequencias.length === 0) ? "✅ Este nome é harmônico." : "❌ Este nome possui sequência negativa.";
  }
}

function chaveSinastria(a,b){
  return `${Math.min(a,b)}-${Math.max(a,b)}`;
}

function mostrarSinastria(){
  if(!dados1 || !dados2) return;
  const nome1 = document.getElementById("social1").value || document.getElementById("nome1").value;
  const nome2 = document.getElementById("social2").value || document.getElementById("nome2").value;

  let texto = textos.sinastria[chave] || `A combinação entre Energia ${dados1.proposito} e Energia ${dados2.proposito}.`;
  const menor = Math.min(dados1.proposito, dados2.proposito);
  const maior = Math.max(dados1.proposito, dados2.proposito);

  texto = texto.replaceAll(`Energia ${menor}`, (dados1.proposito === menor)?nome1:nome2)
               .replaceAll(`Energia ${maior}`, (dados1.proposito === maior)?nome1:nome2);

    // >>> COLE ESSA FUNÇÃO DE APOIO EXATAMENTE AQUI NO COMEÇO:
 const processarMatrizCasado = (nomeCompleto) => {
    // 1. Apenas limpa espaços extras e joga para maiúsculo (MANTÉM os acentos para o seu cálculo)
    let nomeTratado = nomeCompleto.toUpperCase().trim();

    let palavras = nomeTratado.split(/\s+/);
    let letrasDoNome = palavras.join("").split(""); // Array com cada letra mantendo seu acento original

    // 2. Converte as letras usando a SUA função 'calcularValorComAcentos'
    let primeiraLinha = [];
    letrasDoNome.forEach(letra => {
        // Chama a sua função existente aí do portal!
        let valorCabalistico = calcularValorComAcentos(letra); 
        
        // Reduz se o valor da letra com acento passar de 9 (padrão da pirâmide)
        if (valorCabalistico > 9) {
            valorCabalistico = Math.floor(valorCabalistico / 10) + (valorCabalistico % 10);
            if (valorCabalistico > 9) valorCabalistico = Math.floor(valorCabalistico / 10) + (valorCabalistico % 10);
        }
        
        primeiraLinha.push(valorCabalistico);
    });

    // 3. Daqui para frente, a montagem da pirâmide e a contagem de bloqueios continua igual...
    let todasAsLinhas = [primeiraLinha];
    let linhaAtual = primeiraLinha;

    while (linhaAtual.length > 1) {
        let proximaLinha = [];
        for (let i = 0; i < linhaAtual.length - 1; i++) {
            let soma = linhaAtual[i] + linhaAtual[i+1];
            if (soma > 9) soma = Math.floor(soma / 10) + (soma % 10);
            proximaLinha.push(soma);
        }
        todasAsLinhas.push(proximaLinha);
        linhaAtual = proximaLinha;
    }

    let totalSequencias = 0;

  function obterHtmlTextoPiramide(valores) {

    let lines = [valores.map(Number)];
    while(lines[lines.length-1].length > 1){
      let anterior = lines[lines.length-1];
      let nova = [];
      for(let i=0; i<anterior.length-1; i++){
        nova.push(Number(reduzir(anterior[i] + anterior[i+1])));
      }
      lines.push(nova);
    }
    let marcacoes = [];
    for(let l=0; l<lines.length; l++){
      marcacoes[l] = new Set();
      let linha = lines[l];
      let i=0;
      while(i < linha.length){
        let atual = Number(linha[i]);
        let count = 1; let j = i+1;
        while(j < linha.length && Number(linha[j]) === atual) { count++; j++; }
        if(count >= 3){
          for(let k=i; k<i+count; k++) marcacoes[l].add(k);
        }
        i += count;
      }
    }
    let txtPiramide = "";
    for(let l=0; l<lines.length; l++){
      txtPiramide += lines[l].map((n, idx) => {
        if (marcacoes[l].has(idx)) return `<span class="negativo" style="color:#ff3b5c !important; font-weight:bold;">${n}</span>`;
        return n;
      }).join(" ") + "\n";
    }
    return txtPiramide;
  }
